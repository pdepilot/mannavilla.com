<!-- ===== CHATBOT COMPONENT (Standalone) ===== -->
<div id="chatbotWidget" class="chatbot-widget">
  <!-- Floating Button -->
  <button class="chatbot-toggle-btn" id="chatbotToggleBtn">
    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png" alt="Chat" class="chatbot-icon-img" />
    <span class="chatbot-pulse"></span>
  </button>

  <!-- Chat Window -->
  <div class="chatbot-window" id="chatbotWindow">
    <div class="chatbot-header">
      <div class="chatbot-header-info">
        <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png" alt="Bot" class="chatbot-avatar" />
        <div>
          <h4>Mannavilla Assistant</h4>
          <p>Online | Real Estate Expert</p>
        </div>
      </div>
      <button class="chatbot-close-btn" id="chatbotCloseBtn">&times;</button>
    </div>
    
    <div class="chatbot-messages" id="chatbotMessages">
      <div class="chatbot-message bot">
        <div class="chatbot-message-content">
          <span id="greetingMessage">Hello! 👋 Welcome to Mannavilla.</span>
          <span class="chatbot-time">How can I help you today?</span>
        </div>
      </div>
    </div>
    
    <div class="chatbot-input-area">
      <input type="text" id="chatbotInput" placeholder="Type your message..." autocomplete="off" />
      <button id="chatbotSendBtn">Send</button>
    </div>
  </div>
</div>

<style>
  /* ===== CHATBOT COMPONENT STYLES (Independent, no existing styles modified) ===== */
  .chatbot-widget {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 10001;
    font-family: 'Inter', sans-serif;
  }
  
  /* Floating Button */
  .chatbot-toggle-btn {
    width: 65px;
    height: 65px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary, #5b0161), var(--secondary, #14051d));
    border: 3px solid var(--accent, #eed279);
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(91, 1, 97, 0.4);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  
  .chatbot-toggle-btn:hover {
    transform: scale(1.1) rotate(5deg);
    box-shadow: 0 15px 35px rgba(91, 1, 97, 0.5);
  }
  
  .chatbot-icon-img {
    width: 40px;
    height: 40px;
    filter: brightness(0) invert(1);
  }
  
  .chatbot-pulse {
    position: absolute;
    top: -5px;
    right: -5px;
    width: 20px;
    height: 20px;
    background: #4caf50;
    border-radius: 50%;
    border: 2px solid white;
    animation: pulseDot 1.5s infinite;
  }
  
  @keyframes pulseDot {
    0% {
      transform: scale(0.8);
      opacity: 1;
    }
    100% {
      transform: scale(1.4);
      opacity: 0;
    }
  }
  
  /* Chat Window */
  .chatbot-window {
    position: absolute;
    bottom: 80px;
    right: 0;
    width: 380px;
    height: 550px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    display: none;
    flex-direction: column;
    overflow: hidden;
    animation: slideUpChat 0.3s ease;
    border: 1px solid rgba(238, 210, 121, 0.3);
  }
  
  .chatbot-window.open {
    display: flex;
  }
  
  @keyframes slideUpChat {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  
  /* Header */
  .chatbot-header {
    background: linear-gradient(135deg, var(--primary, #5b0161), var(--secondary, #14051d));
    padding: 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid var(--accent, #eed279);
  }
  
  .chatbot-header-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  
  .chatbot-avatar {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: white;
    padding: 8px;
    border: 2px solid var(--accent, #eed279);
  }
  
  .chatbot-header-info h4 {
    color: white;
    margin: 0;
    font-size: 1rem;
    font-weight: 700;
  }
  
  .chatbot-header-info p {
    color: rgba(255, 255, 255, 0.8);
    margin: 0;
    font-size: 0.75rem;
  }
  
  .chatbot-close-btn {
    background: rgba(255, 255, 255, 0.2);
    border: none;
    color: white;
    font-size: 28px;
    cursor: pointer;
    width: 35px;
    height: 35px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
  }
  
  .chatbot-close-btn:hover {
    background: rgba(255, 255, 255, 0.3);
    transform: rotate(90deg);
  }
  
  /* Messages Area */
  .chatbot-messages {
    flex: 1;
    padding: 1rem;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: #f8f9fa;
  }
  
  .chatbot-message {
    display: flex;
    animation: fadeInMessage 0.3s ease;
  }
  
  @keyframes fadeInMessage {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  
  .chatbot-message.user {
    justify-content: flex-end;
  }
  
  .chatbot-message.bot {
    justify-content: flex-start;
  }
  
  .chatbot-message-content {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 0.9rem;
    line-height: 1.4;
  }
  
  .chatbot-message.user .chatbot-message-content {
    background: linear-gradient(135deg, var(--primary, #5b0161), var(--secondary, #14051d));
    color: white;
    border-bottom-right-radius: 4px;
  }
  
  .chatbot-message.bot .chatbot-message-content {
    background: white;
    color: var(--secondary, #14051d);
    border-bottom-left-radius: 4px;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
    border: 1px solid #e0e0e0;
  }
  
  .chatbot-time {
    font-size: 0.7rem;
    opacity: 0.7;
    display: block;
    margin-top: 4px;
  }
  
  /* Input Area */
  .chatbot-input-area {
    padding: 1rem;
    background: white;
    border-top: 1px solid #e0e0e0;
    display: flex;
    gap: 10px;
  }
  
  .chatbot-input-area input {
    flex: 1;
    padding: 10px 15px;
    border: 2px solid #e0e0e0;
    border-radius: 25px;
    font-size: 0.9rem;
    outline: none;
    transition: all 0.3s;
    font-family: 'Inter', sans-serif;
  }
  
  .chatbot-input-area input:focus {
    border-color: var(--primary, #5b0161);
    box-shadow: 0 0 0 3px rgba(91, 1, 97, 0.1);
  }
  
  .chatbot-input-area button {
    padding: 10px 20px;
    background: linear-gradient(135deg, var(--primary, #5b0161), var(--secondary, #14051d));
    color: white;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s;
    font-family: 'Inter', sans-serif;
  }
  
  .chatbot-input-area button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(91, 1, 97, 0.3);
  }
  
  /* Responsive */
  @media (max-width: 576px) {
    .chatbot-widget {
      bottom: 20px;
      right: 20px;
    }
    
    .chatbot-toggle-btn {
      width: 55px;
      height: 55px;
    }
    
    .chatbot-icon-img {
      width: 32px;
      height: 32px;
    }
    
    .chatbot-window {
      width: calc(100vw - 40px);
      height: 500px;
      right: 0;
      bottom: 70px;
    }
  }
  
  /* Custom scrollbar */
  .chatbot-messages::-webkit-scrollbar {
    width: 6px;
  }
  
  .chatbot-messages::-webkit-scrollbar-track {
    background: #f1f1f1;
  }
  
  .chatbot-messages::-webkit-scrollbar-thumb {
    background: var(--primary, #5b0161);
    border-radius: 10px;
  }
</style>

<script>
  (function() {
    'use strict';
    
    // DOM Elements
    const toggleBtn = document.getElementById('chatbotToggleBtn');
    const chatWindow = document.getElementById('chatbotWindow');
    const closeBtn = document.getElementById('chatbotCloseBtn');
    const sendBtn = document.getElementById('chatbotSendBtn');
    const userInput = document.getElementById('chatbotInput');
    const messagesContainer = document.getElementById('chatbotMessages');
    
    // State
    let isOpen = false;
    let isRedirecting = false; // Prevent multiple redirects
    
    // Time-based greeting
    function getTimeBasedGreeting() {
      const hour = new Date().getHours();
      let timeGreeting = '';
      
      if (hour < 12) {
        timeGreeting = 'Good Morning! 🌅';
      } else if (hour < 18) {
        timeGreeting = 'Good Afternoon! ☀️';
      } else {
        timeGreeting = 'Good Evening! 🌙';
      }
      
      return `${timeGreeting} I'm your Mannavilla assistant. How can I help you find your dream property today?`;
    }
    
    // Set greeting message
    function setGreeting() {
      const greetingSpan = document.querySelector('#greetingMessage');
      if (greetingSpan) {
        greetingSpan.textContent = getTimeBasedGreeting();
      }
    }
    
    // Add message to chat
    function addMessage(text, isUser = false) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `chatbot-message ${isUser ? 'user' : 'bot'}`;
      
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      
      messageDiv.innerHTML = `
        <div class="chatbot-message-content">
          ${text}
          <span class="chatbot-time">${time}</span>
        </div>
      `;
      
      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    // Show typing indicator
    function showTypingIndicator() {
      const typingDiv = document.createElement('div');
      typingDiv.className = 'chatbot-message bot';
      typingDiv.id = 'typingIndicator';
      typingDiv.innerHTML = `
        <div class="chatbot-message-content" style="padding: 12px 18px;">
          <span style="display: flex; gap: 4px;">
            <span style="animation: typingDot 1.4s infinite;">•</span>
            <span style="animation: typingDot 1.4s infinite 0.2s;">•</span>
            <span style="animation: typingDot 1.4s infinite 0.4s;">•</span>
          </span>
        </div>
      `;
      
      // Add animation style if not exists
      if (!document.getElementById('typingDotStyle')) {
        const style = document.createElement('style');
        style.id = 'typingDotStyle';
        style.textContent = `
          @keyframes typingDot {
            0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-4px); }
          }
        `;
        document.head.appendChild(style);
      }
      
      messagesContainer.appendChild(typingDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    function hideTypingIndicator() {
      const indicator = document.getElementById('typingIndicator');
      if (indicator) {
        indicator.remove();
      }
    }
    
    // Human-like random typing delay (900ms - 1500ms)
    function getRandomTypingDelay() {
      return Math.floor(Math.random() * (1500 - 900 + 1) + 900);
    }
    
    // WhatsApp redirect with natural flow
    async function redirectToWhatsAppWithDelay() {
      if (isRedirecting) return;
      isRedirecting = true;
      
      // First message: Acknowledgment
      addMessage("Hmm... I want to make sure I give you the right information. Let me connect you with one of our experts in a moment... 🤔", false);
      
      // Show typing indicator for second message
      await new Promise(resolve => setTimeout(resolve, getRandomTypingDelay()));
      showTypingIndicator();
      
      await new Promise(resolve => setTimeout(resolve, getRandomTypingDelay()));
      hideTypingIndicator();
      
      // Second message: Redirect notification
      addMessage("You'll be redirected to WhatsApp shortly so our team can assist you directly. 📱", false);
      
      // Final delay before redirect
      await new Promise(resolve => setTimeout(resolve, 2500));
      
      // Perform redirect
      const phoneNumber = '+1234567890'; // Replace with actual number
      const message = encodeURIComponent('Hi! I need assistance with your real estate services. I was just chatting with your bot.');
      window.open(`https://wa.me/${phoneNumber}?text=${message}`, '_blank');
      
      isRedirecting = false;
    }
    
    // Enhanced bot response logic with more real estate topics
    function getBotResponse(userMessage) {
      const msg = userMessage.toLowerCase().trim();
      
      // --- EXISTING RESPONSES (Kept intact) ---
      
      // Property Search
      if (msg.includes('property') && (msg.includes('search') || msg.includes('find') || msg.includes('looking'))) {
        return "🔍 I can help you search for properties! We have listings in:\n\n• Apartments ($200K - $500K)\n• Villas ($800K - $2.5M)\n• Commercial Spaces ($500K - $3M)\n\nWould you like me to show you our featured listings or connect you with an agent?";
      }
      
      // Pricing
      if (msg.includes('price') || msg.includes('cost') || msg.includes('how much')) {
        return "💰 Our properties range from $150,000 for cozy apartments to $5,000,000+ for luxury estates. Pricing varies based on:\n• Location & neighborhood\n• Property size & amenities\n• Market conditions\n\nWould you like to browse properties in a specific price range?";
      }
      
      // Location (general)
      if (msg.includes('location') || msg.includes('area') || msg.includes('city') || msg.includes('where')) {
        return "📍 We serve prime locations including:\n• Downtown & City Center\n• Beverly Hills & Luxury Districts\n• Waterfront Properties\n• Suburban Family Communities\n\nWhich area interests you most?";
      }
      
      // Services
      if (msg.includes('service') || msg.includes('help') || msg.includes('do you')) {
        return "✨ Our premium services include:\n\n🏠 Property Sales & Rentals\n📊 Free Property Valuation\n🔍 Market Analysis & Consultation\n📝 Legal & Documentation Support\n🏦 Mortgage & Financing Assistance\n\nWhat service would you like to learn more about?";
      }
      
      // Buying Process
      if (msg.includes('buy') || msg.includes('process') || msg.includes('step') || msg.includes('how to')) {
        return "🏡 The buying process at Mannavilla:\n\n1️⃣ Initial Consultation & Needs Assessment\n2️⃣ Property Search & Viewings\n3️⃣ Offer & Negotiation\n4️⃣ Legal Documentation & Due Diligence\n5️⃣ Finalize Purchase & Handover\n\nWould you like to schedule a free consultation?";
      }
      
      // Property Verification
      if (msg.includes('verify') || msg.includes('legit') || msg.includes('authentic') || msg.includes('trust')) {
        return "✅ All our properties are thoroughly verified:\n\n• Legal Title Verification\n• Property Inspection Reports\n• Clear Ownership Documents\n• No Encumbrance Certificate\n\nWe provide 100% verified listings. Need verification for a specific property?";
      }
      
      // Contact/Agent
      if (msg.includes('agent') || msg.includes('contact') || msg.includes('call') || msg.includes('speak')) {
        return "📞 I'd be happy to connect you with our expert agents! You can:\n\n• Click the 'Sell Your Property' button above\n• Visit our Contact page\n• Or I can redirect you to WhatsApp for immediate assistance\n\nWould you like me to connect you now?";
      }
      
      // Greeting
      if (msg.includes('hello') || msg.includes('hi') || msg.includes('hey')) {
        return "Hello! 👋 Welcome to Mannavilla. I'm here to help you find your perfect property or answer any questions you have. What would you like to know?";
      }
      
      // Thanks
      if (msg.includes('thank') || msg.includes('thanks')) {
        return "You're most welcome! 😊 Is there anything else I can help you with regarding properties or our services?";
      }
      
      // --- NEW REAL ESTATE RESPONSES (Added) ---
      
      // Payment / Installments
      if (msg.includes('installment') || msg.includes('payment plan') || (msg.includes('pay') && msg.includes('monthly'))) {
        return "💳 We offer flexible payment plans! Many of our properties come with:\n\n• 10% initial deposit\n• Up to 24-month installment options\n• Bank mortgage partnerships\n• 0% interest developer plans on select properties\n\nWould you like to know which properties have flexible payment options?";
      }
      
      // Property Types (detailed)
      if (msg.includes('duplex') || msg.includes('bungalow') || msg.includes('apartment') || msg.includes('land') || msg.includes('townhouse')) {
        let propertyType = '';
        if (msg.includes('duplex')) propertyType = 'Duplex';
        else if (msg.includes('bungalow')) propertyType = 'Bungalow';
        else if (msg.includes('apartment')) propertyType = 'Apartment';
        else if (msg.includes('land')) propertyType = 'Land';
        else if (msg.includes('townhouse')) propertyType = 'Townhouse';
        else propertyType = 'property';
        
        return `🏘️ We have a variety of ${propertyType} options available!\n\n• Starting from $150K\n• Multiple locations\n• Various sizes and configurations\n\nWould you like to see our current ${propertyType.toLowerCase()} listings?`;
      }
      
      // Property Inspection / Visit
      if (msg.includes('inspection') || msg.includes('visit') || msg.includes('view property') || msg.includes('see the property')) {
        return "🔍 Property inspections are available! Here's how it works:\n\n• Schedule a physical viewing\n• Virtual tour options available\n• Accompanied by our expert agents\n• Detailed property reports provided\n\nWould you like to schedule an inspection for a specific property?";
      }
      
      // Documentation / Legal
      if (msg.includes('document') || msg.includes('c of o') || msg.includes('c-of-o') || msg.includes('title') || msg.includes('papers') || msg.includes('legal')) {
        return "📄 We ensure all properties have proper documentation:\n\n• C of O (Certificate of Occupancy)\n• Survey Plans\n• Building Approvals\n• Title Deeds\n• Registered with relevant authorities\n\nAll documents are verified before listing. Need help with documentation for a specific property?";
      }
      
      // Investment / ROI
      if (msg.includes('investment') || msg.includes('roi') || msg.includes('return') || msg.includes('value appreciate')) {
        return "📈 Real estate is a great investment! Our properties typically offer:\n\n• 8-15% annual appreciation\n• Rental yields of 5-10%\n• Strong capital appreciation in developing areas\n• Portfolio diversification\n\nWould you like to speak with our investment advisor about ROI opportunities?";
      }
      
      // Nigerian Locations
      if (msg.includes('imo') || msg.includes('owerri') || msg.includes('lagos') || msg.includes('abuja') || msg.includes('port harcourt') || msg.includes('enugu')) {
        let location = '';
        if (msg.includes('imo')) location = 'Imo State';
        else if (msg.includes('owerri')) location = 'Owerri';
        else if (msg.includes('lagos')) location = 'Lagos';
        else if (msg.includes('abuja')) location = 'Abuja';
        else if (msg.includes('port harcourt')) location = 'Port Harcourt';
        else if (msg.includes('enugu')) location = 'Enugu';
        else location = 'that area';
        
        return `📍 We have excellent properties in ${location}! 🏠\n\n• Luxury homes and commercial spaces\n• Affordable family housing\n• Prime locations with good infrastructure\n• Verified listings with proper documentation\n\nWould you like to see our current listings in ${location}?`;
      }
      
      // Lifestyle / Family / Safety
      if (msg.includes('family') || msg.includes('safe') || msg.includes('environment') || msg.includes('school') || msg.includes('security')) {
        return "👨‍👩‍👧‍👦 Family-friendly properties are our specialty!\n\nWe consider:\n• Proximity to schools & hospitals\n• Gated communities with 24/7 security\n• Parks & recreational areas\n• Quiet neighborhoods\n• Modern amenities\n\nWould you like recommendations for family-friendly properties?";
      }
      
      // Property Size / Bedrooms
      if (msg.includes('bedroom') || msg.includes('bathroom') || msg.includes('size') || msg.includes('sqft') || msg.includes('square')) {
        return "📐 We have properties in various sizes:\n\n• 2-3 Bedroom Apartments: 1,200-1,800 sqft\n• 4-5 Bedroom Homes: 2,500-4,000 sqft\n• Luxury Villas: 5,000+ sqft\n• Commercial Spaces: 1,000-10,000 sqft\n\nWhat size property are you looking for?";
      }
      
      // Default: fall through to redirect
      return null;
    }
    
    // Handle user message with improved flow
    async function handleUserMessage() {
      const message = userInput.value.trim();
      if (!message || isRedirecting) return;
      
      // Add user message
      addMessage(message, true);
      userInput.value = '';
      
      // Show typing indicator
      showTypingIndicator();
      
      // Human-like random delay before response
      await new Promise(resolve => setTimeout(resolve, getRandomTypingDelay()));
      
      // Get bot response
      const botResponse = getBotResponse(message);
      
      hideTypingIndicator();
      
      if (botResponse) {
        // Show bot response with another natural delay
        await new Promise(resolve => setTimeout(resolve, getRandomTypingDelay()));
        addMessage(botResponse, false);
      } else {
        // Unrecognized message - initiate natural WhatsApp redirect flow
        await redirectToWhatsAppWithDelay();
      }
    }
    
    // Toggle chat window
    function toggleChat() {
      isOpen = !isOpen;
      if (isOpen) {
        chatWindow.classList.add('open');
        userInput.focus();
      } else {
        chatWindow.classList.remove('open');
      }
    }
    
    // Event Listeners
    if (toggleBtn) {
      toggleBtn.addEventListener('click', toggleChat);
    }
    
    if (closeBtn) {
      closeBtn.addEventListener('click', toggleChat);
    }
    
    if (sendBtn) {
      sendBtn.addEventListener('click', handleUserMessage);
    }
    
    if (userInput) {
      userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !isRedirecting) {
          handleUserMessage();
        }
      });
    }
    
    // Close chat when clicking outside (optional)
    document.addEventListener('click', (e) => {
      const widget = document.getElementById('chatbotWidget');
      if (widget && !widget.contains(e.target) && isOpen) {
        toggleChat();
      }
    });
    
    // Initialize greeting
    setGreeting();
    
    console.log('Chatbot enhanced — smarter responses, human-like delays, improved WhatsApp flow');
  })();
</script>
